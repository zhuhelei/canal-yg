	        function toHex(value, length) {
            var hex = value.toString(16);
            hex = hex.padStart(8, '0'); //不足8位时前面补0
            // while (hex.length < length) {
            //     hex = '0' + hex;
            // }
            return hex;
        }  

	        L.TileLayer.ArcGIS = L.TileLayer.extend({             
            // 重写 getTileUrl 方法，将 4326 坐标转换为 3857
            getTileUrl: function(coords) {
                // 获取地图实例和缩放级别
                const map = this._map;
                const zoom = map.getZoom();            
                
                var col = toHex(coords.x, 8); // 将 {x} 转换为 8 位十六进制字
                var row = toHex(coords.y, 8); // 将 {y} 转换为 8 位十六进制字符串
                
                // 使用转换后的坐标生成 URL
                return L.Util.template(this._url, {
                    x: col,
                    y: row,
                    z: zoom,
                    s: this._getSubdomain(coords)
                    });
                }
            }
        );
